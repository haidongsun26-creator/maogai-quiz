<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>刷题</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; padding-bottom: 70px; }
.header { background: linear-gradient(135deg, #4A90D9, #357ABD); color: #fff; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 20px; }
.header .back { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 24px; cursor: pointer; display: none; }
.container { max-width: 600px; margin: 0 auto; padding: 12px; }

/* 统计卡片 */
.stats-card { background: linear-gradient(135deg, #4A90D9, #357ABD); color: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.stats-card h3 { font-size: 16px; margin-bottom: 12px; opacity: .8; }
.stats-head { display: flex; justify-content: space-between; align-items: center; }
.stats-reset { font-size: 12px; opacity: .85; background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.45); color: #fff; padding: 4px 12px; border-radius: 12px; cursor: pointer; }
.stats-reset:active { background: rgba(255,255,255,.3); }
.stats-grid { display: flex; justify-content: space-around; text-align: center; }
.stats-num { font-size: 28px; font-weight: bold; }
.stats-label { font-size: 12px; opacity: .8; margin-top: 4px; }

/* 功能入口 */
.section-title { font-size: 16px; font-weight: bold; margin: 16px 0 10px; padding-left: 4px; }
.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.menu-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.menu-item { background: #fff; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: transform .15s; position: relative; }
.menu-item:active { transform: scale(.96); }
.menu-icon { font-size: 32px; margin-bottom: 8px; }
.menu-text { font-size: 14px; color: #333; }
.menu-badge { position: absolute; top: 8px; right: 8px; background: #ff4d4f; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; }

/* 题型列表 */
.type-item { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.type-name { font-size: 15px; }
.type-count { font-size: 13px; color: #999; margin-top: 4px; }
.type-arrow { font-size: 20px; color: #ccc; }

/* 章节列表 */
.chapter-item { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.chapter-name { font-size: 15px; font-weight: 500; }
.chapter-count { font-size: 13px; color: #999; margin-top: 4px; }

/* 答题页 */
.q-progress { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; }
.q-progress .num { font-size: 24px; font-weight: bold; color: #4A90D9; }
.q-progress .total { font-size: 14px; color: #999; }
.q-progress .bar { flex: 1; height: 8px; background: #e8e8e8; border-radius: 4px; overflow: hidden; }
.q-progress .fill { height: 100%; background: #4A90D9; border-radius: 4px; transition: width .3s; }
.q-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
.q-meta { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.q-meta .tag { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px; }
.tag-s { background: #e6f7ff; color: #1890ff; }
.tag-m { background: #f6ffed; color: #52c41a; }
.tag-j { background: #fff7e6; color: #fa8c16; }
.tag-ch { background: #f0f0f0; color: #666; }
.q-text { font-size: 16px; line-height: 1.7; margin-bottom: 16px; }
.opt-item { display: flex; align-items: flex-start; padding: 12px 14px; margin-bottom: 8px; background: #f5f5f5; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: all .2s; }
.opt-item:active { background: #e6f7ff; }
.opt-item.selected { border-color: #4A90D9; background: #e6f7ff; }
.opt-item.correct { border-color: #52c41a; background: #f6ffed; }
.opt-item.wrong { border-color: #ff4d4f; background: #fff2f0; }
.opt-item.disabled { pointer-events: none; }
.opt-key { width: 28px; height: 28px; line-height: 28px; text-align: center; background: #fff; border-radius: 50%; font-size: 14px; font-weight: bold; color: #666; margin-right: 12px; flex-shrink: 0; }
.opt-val { font-size: 14px; line-height: 28px; flex: 1; }
.opt-icon { font-size: 18px; font-weight: bold; margin-left: 8px; line-height: 28px; }
.opt-icon.ok { color: #52c41a; }
.opt-icon.no { color: #ff4d4f; }

.judge-grid { display: flex; gap: 12px; }
.judge-btn { flex: 1; padding: 16px; text-align: center; background: #f5f5f5; border-radius: 10px; border: 2px solid transparent; font-size: 18px; cursor: pointer; transition: all .2s; }
.judge-btn:active { background: #e6f7ff; }
.judge-btn.selected { border-color: #4A90D9; background: #e6f7ff; }
.judge-btn.correct { border-color: #52c41a; background: #f6ffed; }
.judge-btn.wrong { border-color: #ff4d4f; background: #fff2f0; }
.judge-btn.disabled { pointer-events: none; }

.result-box { padding: 14px; border-radius: 8px; margin: 16px 0; font-size: 15px; }
.result-box.ok { background: #f6ffed; color: #52c41a; font-weight: bold; }
.result-box.fail { background: #fff2f0; color: #ff4d4f; font-weight: bold; }
.correct-info { font-size: 14px; color: #666; margin-bottom: 12px; }
.action-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid #f0f0f0; margin-top: 16px; }
.fav-btn { cursor: pointer; font-size: 14px; color: #faad14; padding: 8px 0; }
.next-btn { background: #4A90D9; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; }
.next-btn:active { background: #357ABD; }

/* 结果页 */
.result-card { background: linear-gradient(135deg, #4A90D9, #357ABD); border-radius: 12px; padding: 40px 20px; text-align: center; color: #fff; margin-bottom: 16px; }
.score-circle { width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 16px; }
.score-num { font-size: 42px; font-weight: bold; line-height: 1; }
.score-unit { font-size: 14px; opacity: .8; }
.result-title { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
.result-sub { font-size: 14px; opacity: .8; }
.action-buttons { display: flex; gap: 12px; margin-top: 20px; }
.action-buttons button { flex: 1; padding: 14px; border-radius: 10px; font-size: 16px; border: none; cursor: pointer; }
.btn-primary { background: #4A90D9; color: #fff; }
.btn-ghost { background: #f0f0f0; color: #666; }

/* 底部导航 */
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; border-top: 1px solid #e8e8e8; z-index: 100; max-width: 600px; margin: 0 auto; }
.tab-item { flex: 1; text-align: center; padding: 8px 0; cursor: pointer; font-size: 11px; color: #999; }
.tab-item.active { color: #4A90D9; }
.tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }

/* 加载 */
.loading { text-align: center; padding: 60px 0; color: #999; font-size: 15px; }
/* 多选提交按钮 */
.submit-btn { background: #4A90D9; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 12px; display: none; }
.submit-btn.show { display: block; }
</style>
</head>

"},{"key":"B","value":"节约意识"},{"key":"C","value":"环保意识"},{"key":"D","value":"生态意识"}],"answer":"BCD","chapter":"第八章 科学发展观"},{"id":288,"type":"multiple","question":"新形势下全面提高党的建设科学化水平的总要求是：要增强紧迫感和责任感，牢牢把握加强党的（  ）建设。","options":[{"key":"A","value":"执政能力"},{"key":"B","value":"先进性"},{"key":"C","value":"纯洁性"},{"key":"D","value":"联系群众"}],"answer":"ABC","chapter":"第八章 科学发展观"},{"id":289,"type":"multiple","question":"胡锦涛强调，全面提高党的建设科学化水平，建设（  ）的马克思主义执政党。","options":[{"key":"A","value":"民主型"},{"key":"B","value":"学习型"},{"key":"C","value":"服务型"},{"key":"D","value":"创新型"}],"answer":"BCD","chapter":"第八章 科学发展观"},{"id":290,"type":"multiple","question":"胡锦涛指出，（  ）是我们党执政以后的一项根本任务。","options":[{"key":"A","value":"提高党的执政能力"},{"key":"B","value":"改革开放"},{"key":"C","value":"巩固党的执政地位"},{"key":"D","value":"经济建设"}],"answer":"AC","chapter":"第八章 科学发展观"},{"id":291,"type":"multiple","question":"科学发展观强调，要努力认识和把握执政规律，坚持（  ），不断研究新情况，解决新问题，创造新机制，增长新本领。","options":[{"key":"A","value":"科学执政"},{"key":"B","value":"民主执政"},{"key":"C","value":"依法执政"},{"key":"D","value":"创新执政"}],"answer":"ABC","chapter":"第八章 科学发展观"}];

<script>
// ===== 数据 =====
let ALL = [];
let CHAPTERS = [];

// ===== 存储 =====
const K = k => CONFIG.storagePrefix + k;
const load = (k, d) => { try { return JSON.parse(localStorage.getItem(K(k))) || d; } catch { return d; } };
const save = (k, v) => localStorage.setItem(K(k), JSON.stringify(v));
let wrongList = load('wrong', []);
let favList = load('fav', []);
let progress = load('progress', { total: 0, correct: 0, wrong: 0 });

// ===== 页面状态 =====
let currentPage = 'home';
let pageStack = [];

// ===== 初始化 =====
function init() {
  try {
    document.title = CONFIG.title;
    // 过滤无答案或无选项的脏数据
    ALL = ALL_DATA.filter(q => q.answer && (q.type === 'judge' || (q.options && q.options.length)));
    // 保留题库自带的 id;缺失或重复时才自动补号,保证错题/收藏去重可靠
    const seen = new Set();
    ALL.forEach((q, i) => {
      if (q.id == null || seen.has(q.id)) q.id = 'q' + (i + 1);
      seen.add(q.id);
    });
    // 按题库中出现的先后排列章节(不能用 sort,否则"第八章"会排到"第三章"前面)
    CHAPTERS = [...new Set(ALL.map(q => q.chapter))];
    showHome();
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="loading">加载失败<br>' + e.message + '</div>';
  }
}

// ===== 错题 =====
function addWrong(q) {
  if (!wrongList.find(x => x.id === q.id)) {
    wrongList.unshift(q);
    save('wrong', wrongList);
  }
}

// ===== 通用 =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function goBack() {
  if (pageStack.length) { pageStack.pop()(); } else { showHome(); }
}
function setPage(page, title) {
  currentPage = page;
  document.getElementById('pageTitle').textContent = title || CONFIG.title;
  document.getElementById('backBtn').style.display = (page === 'home' || page === 'wrong' || page === 'fav') ? 'none' : 'inline';
  document.getElementById('tabBar').style.display = (page === 'home' || page === 'wrong' || page === 'fav') ? 'flex' : 'none';
  document.querySelectorAll('.tab-item').forEach((t, i) => {
    t.classList.toggle('active', ['home','wrong','fav'][i] === page);
  });
}

// ===== 首页 =====
function showHome() {
  setPage('home', CONFIG.title);
  const acc = progress.total > 0 ? Math.round(progress.correct / progress.total * 100) : 0;
  const counts = { single: ALL.filter(q=>q.type==='single').length, multiple: ALL.filter(q=>q.type==='multiple').length, judge: ALL.filter(q=>q.type==='judge').length };

  document.getElementById('app').innerHTML = `
    <div class="stats-card">
      <div class="stats-head"><h3>学习统计</h3><button class="stats-reset" onclick="resetProgress()">🔄 重置</button></div>
      <div class="stats-grid">
        <div><div class="stats-num">${progress.total}</div><div class="stats-label">已答题</div></div>
        <div><div class="stats-num" style="color:#b7eb8f">${progress.correct}</div><div class="stats-label">答对</div></div>
        <div><div class="stats-num" style="color:#ffa39e">${progress.wrong}</div><div class="stats-label">答错</div></div>
        <div><div class="stats-num">${acc}%</div><div class="stats-label">正确率</div></div>
      </div>
    </div>
    <div class="section-title">刷题模式</div>
    <div class="menu-grid">
      <div class="menu-item" onclick="startRandom()"><div class="menu-icon">🎲</div><div class="menu-text">随机刷题</div></div>
      <div class="menu-item" onclick="startExam()"><div class="menu-icon">📝</div><div class="menu-text">模拟考试</div></div>
      <div class="menu-item" onclick="showTab('wrong')"><div class="menu-icon">❌</div><div class="menu-text">错题本</div>${wrongList.length?'<div class="menu-badge">'+wrongList.length+'</div>':''}</div>
      <div class="menu-item" onclick="showPreviewChapters()"><div class="menu-icon">📖</div><div class="menu-text">题库预览</div></div>
    </div>
    <div class="section-title">按题型练习</div>
    ${counts.single ? `<div class="type-item" onclick="startByType('single')"><div><div class="type-name">单项选择题</div><div class="type-count">${counts.single} 道 · 点击即答</div></div><div class="type-arrow">›</div></div>` : ''}
    ${counts.multiple ? `<div class="type-item" onclick="startByType('multiple')"><div><div class="type-name">多项选择题</div><div class="type-count">${counts.multiple} 道 · 需确认</div></div><div class="type-arrow">›</div></div>` : ''}
    ${counts.judge ? `<div class="type-item" onclick="startByType('judge')"><div><div class="type-name">判断题</div><div class="type-count">${counts.judge} 道 · 点击即答</div></div><div class="type-arrow">›</div></div>` : ''}
  `;
}

// ===== 题库预览 =====
function showPreviewChapters() {
  pageStack.push(showHome);
  setPage('preview', '题库预览');
  const chCounts = {};
  ALL.forEach(q => { chCounts[q.chapter] = (chCounts[q.chapter]||0) + 1; });
  document.getElementById('app').innerHTML = CHAPTERS.map((ch, i) => `
    <div class="chapter-item" onclick="showPreviewChapter(${i})">
      <div><div class="chapter-name">${ch}</div><div class="chapter-count">${chCounts[ch]} 道</div></div>
      <div class="type-arrow">›</div>
    </div>`).join('');
}

function showPreviewChapter(i) {
  const ch = CHAPTERS[i];
  pageStack.push(showPreviewChapters);
  setPage('preview-ch', ch);
  const qs = ALL.filter(q => q.chapter === ch);
  document.getElementById('app').innerHTML = qs.map((q, n) => {
    const opts = (q.options || []).map(o => {
      const ok = q.answer.includes(o.key);
      return `<div class="opt-item disabled ${ok ? 'correct' : ''}" style="padding:8px 12px;margin-bottom:6px">
        <div class="opt-key" style="width:24px;height:24px;line-height:24px;font-size:13px">${o.key}</div>
        <div class="opt-val" style="line-height:24px">${o.value}</div>${ok?'<span class="opt-icon ok" style="line-height:24px">✓</span>':''}</div>`;
    }).join('');
    return `<div class="q-card" style="margin-bottom:10px">
      <div class="q-meta"><span class="tag tag-${q.type[0]}">${{single:'单选',multiple:'多选',judge:'判断'}[q.type]}</span></div>
      <div class="q-text" style="margin-bottom:10px">${n+1}. ${q.question}</div>
      ${opts}
      <div class="correct-info" style="margin:8px 0 0">正确答案：${q.answer}</div>
    </div>`;
  }).join('');
}

// ===== 学习统计重置 =====
function resetProgress() {
  if (confirm('确定把学习统计清零？(不影响错题本和收藏)')) {
    progress = { total: 0, correct: 0, wrong: 0 };
    save('progress', progress);
    showHome();
  }
}

// ===== 开始答题 =====
function startRandom() { pageStack.push(showHome); startQuiz(shuffle(ALL), '随机刷题'); }
function startByType(type) { pageStack.push(showHome); const names={single:'单项选择题',multiple:'多项选择题',judge:'判断题'}; startQuiz(shuffle(ALL.filter(q=>q.type===type)), names[type]); }
function startExam() {
  pageStack.push(showHome);
  const single = shuffle(ALL.filter(q => q.type === 'single')).slice(0, CONFIG.exam.single);
  const multiple = shuffle(ALL.filter(q => q.type === 'multiple')).slice(0, CONFIG.exam.multiple);
  const judge = shuffle(ALL.filter(q => q.type === 'judge')).slice(0, CONFIG.exam.judge);
  startQuiz([...single, ...multiple, ...judge], '模拟考试', true);
}

let quizState = {};
function startQuiz(questions, title, isExam) {
  if (!questions.length) { alert('该范围内暂无题目'); goBack(); return; }
  setPage('quiz', title);
  quizState = { questions, index: 0, correct: 0, wrong: 0, answered: false, userAnswer: '', selectedKeys: new Set(), title, isExam: !!isExam };
  renderQuestion();
}

function renderQuestion() {
  const { questions, index, answered, userAnswer, selectedKeys } = quizState;
  const q = questions[index];
  const pct = Math.round(index / questions.length * 100);
  const isJudge = q.type === 'judge';
  const isMultiple = q.type === 'multiple';

  let optionsHtml = '';
  if (isJudge) {
    const vals = ['对', '错'];
    optionsHtml = `<div class="judge-grid">${vals.map(v => {
      let cls = 'judge-btn';
      if (answered) {
        cls += ' disabled';
        if (v === q.answer) cls += ' correct';
        else if (v === userAnswer && v !== q.answer) cls += ' wrong';
      } else if (v === userAnswer) {
        cls += ' selected';
      }
      return `<div class="${cls}" onclick="${answered?'':'selectJudge(\''+v+'\')'}">${v==='对'?'✓ 对':'✗ 错'}</div>`;
    }).join('')}</div>`;
  } else {
    optionsHtml = q.options.map(opt => {
      let cls = 'opt-item';
      let icon = '';
      if (answered) {
        cls += ' disabled';
        if (q.answer.includes(opt.key)) { cls += ' correct'; icon = '<span class="opt-icon ok">✓</span>'; }
        else if (selectedKeys.has(opt.key)) { cls += ' wrong'; icon = '<span class="opt-icon no">✗</span>'; }
      } else if (selectedKeys.has(opt.key)) {
        cls += ' selected';
      }
      return `<div class="${cls}" onclick="${answered?'':'selectOpt(\''+opt.key+'\')'}">
        <div class="opt-key">${opt.key}</div><div class="opt-val">${opt.value}</div>${icon}</div>`;
    }).join('');
  }

  let resultHtml = '';
  if (answered) {
    const isCorrect = userAnswer === q.answer;
    resultHtml = `<div class="result-box ${isCorrect?'ok':'fail'}">
      ${isCorrect?'✓ 回答正确！':'✗ 回答错误，正确答案是 '+q.answer}
    </div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="q-progress">
      <span class="num">${index+1}</span><span class="total">/ ${questions.length}</span>
      <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-meta">
        <span class="tag tag-${q.type[0]}">${{single:'单选',multiple:'多选',judge:'判断'}[q.type]}</span>
        <span class="tag tag-ch">${q.chapter}</span>
      </div>
      <div class="q-text">${q.question}</div>
      ${optionsHtml}
      ${resultHtml}
      <div class="action-bar">
        <div class="fav-btn" onclick="toggleFav()">${isFav(q.id)?'★ 已收藏':'☆ 收藏'}</div>
        ${answered?`<button class="next-btn" onclick="nextQ()">${index<questions.length-1?'下一题':'查看结果'}</button>`:''}
      </div>
      ${isMultiple && !answered ? `<button class="submit-btn show" onclick="submitMultiple()">确认提交</button>` : ''}
    </div>
  `;
}

function selectOpt(key) {
  const q = quizState.questions[quizState.index];
  if (q.type === 'single') {
    quizState.selectedKeys = new Set([key]);
    quizState.userAnswer = key;
    checkAnswer();
  } else {
    if (quizState.selectedKeys.has(key)) quizState.selectedKeys.delete(key);
    else quizState.selectedKeys.add(key);
    quizState.userAnswer = [...quizState.selectedKeys].sort().join('');
    renderQuestion();
  }
}

function selectJudge(val) {
  quizState.userAnswer = val;
  checkAnswer();
}

function submitMultiple() {
  if (!quizState.userAnswer) return;
  checkAnswer();
}

function checkAnswer() {
  const q = quizState.questions[quizState.index];
  const correct = quizState.userAnswer === q.answer;
  quizState.answered = true;
  if (correct) quizState.correct++; else { quizState.wrong++; addWrong(q); }
  progress.total++; correct ? progress.correct++ : progress.wrong++;
  save('progress', progress);
  renderQuestion();
  if (correct) {
    // 只在仍停留在本题时才自动跳转,避免用户已手动翻页后被多跳一题
    const idx = quizState.index, qs = quizState.questions;
    setTimeout(() => {
      if (quizState.questions === qs && quizState.index === idx && quizState.answered) nextQ();
    }, 600);
  }
}

function nextQ() {
  quizState.index++;
  quizState.answered = false;
  quizState.userAnswer = '';
  quizState.selectedKeys = new Set();
  if (quizState.index >= quizState.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ===== 结果页 =====
function showResult() {
  const { questions, correct, wrong, title, isExam } = quizState;
  const singleCount = questions.filter(q => q.type === 'single').length;
  const multipleCount = questions.filter(q => q.type === 'multiple').length;
  const judgeCount = questions.filter(q => q.type === 'judge').length;
  setPage('result', title || '练习结果');
  const acc = questions.length ? Math.round(correct / questions.length * 100) : 0;
  // 考试模式按每题 1 分计分;普通练习只展示正确率,不再误标"/100 分"
  const circle = isExam
    ? `<div class="score-circle"><div class="score-num">${correct}</div><div class="score-unit">/ ${questions.length} 分</div></div>`
    : `<div class="score-circle"><div class="score-num">${acc}%</div><div class="score-unit">正确率</div></div>`;
  document.getElementById('app').innerHTML = `
    <div class="result-card">
      ${circle}
      <div class="result-title">${acc>=90?'优秀！🎉':acc>=80?'很好👍':acc>=60?'及格':'继续加油💪'}</div>
      <div class="result-sub">单选 ${singleCount}题 · 多选 ${multipleCount}题 · 判断 ${judgeCount}题</div>
    </div>
    <div style="background:#fff;border-radius:12px;padding:20px;">
      <div class="stats-grid">
        <div><div class="stats-num" style="color:#4A90D9">${questions.length}</div><div class="stats-label">总题数</div></div>
        <div><div class="stats-num" style="color:#52c41a">${correct}</div><div class="stats-label">答对</div></div>
        <div><div class="stats-num" style="color:#ff4d4f">${wrong}</div><div class="stats-label">答错</div></div>
        <div><div class="stats-num" style="color:#faad14">${isExam?correct+' 分':acc+'%'}</div><div class="stats-label">${isExam?'得分':'正确率'}</div></div>
      </div>
    </div>
    <div class="action-buttons">
      <button class="btn-ghost" onclick="goBack()">返回</button>
      <button class="btn-primary" onclick="showHome()">首页</button>
    </div>
  `;
}

// ===== 错题本 =====
function showWrongTab() {
  setPage('wrong', '错题本');
  if (!wrongList.length) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:80px 0;color:#999"><div style="font-size:48px;margin-bottom:16px">✓</div>暂无错题</div>';
    return;
  }
  document.getElementById('app').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="color:#999;font-size:13px">共 ${wrongList.length} 道</span>
      <div>
        <button onclick="clearWrong()" style="background:none;border:1px solid #ddd;padding:6px 14px;border-radius:6px;font-size:13px;color:#999;margin-right:8px">清空</button>
        <button onclick="practiceWrong()" style="background:#4A90D9;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:13px">错题重练</button>
      </div>
    </div>
    ${wrongList.map((q,i) => renderQCard(q, i, 'wrong')).join('')}
  `;
}

// ===== 收藏 =====
function showFavTab() {
  setPage('fav', '我的收藏');
  if (!favList.length) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:80px 0;color:#999"><div style="font-size:48px;margin-bottom:16px">⭐</div>暂无收藏</div>';
    return;
  }
  document.getElementById('app').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="color:#999;font-size:13px">共 ${favList.length} 道</span>
      <div>
        <button onclick="clearFav()" style="background:none;border:1px solid #ddd;padding:6px 14px;border-radius:6px;font-size:13px;color:#999;margin-right:8px">清空</button>
        <button onclick="practiceFav()" style="background:#4A90D9;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:13px">收藏练习</button>
      </div>
    </div>
    ${favList.map((q,i) => renderQCard(q, i, 'fav')).join('')}
  `;
}

function renderQCard(q, i, from) {
  const typeTag = {single:'tag-s',multiple:'tag-m',judge:'tag-j'}[q.type];
  const typeName = {single:'单选',multiple:'多选',judge:'判断'}[q.type];
  return `<div class="q-card" style="margin-bottom:10px">
    <div class="q-meta"><span class="tag ${typeTag}">${typeName}</span><span class="tag tag-ch">${q.chapter}</span></div>
    <div class="q-text" style="margin-bottom:8px">${q.question}</div>
    <div class="correct-info">正确答案：${q.answer}</div>
    <div style="text-align:right">
      <button onclick="${from==='wrong'?'removeWrong('+i+')':'removeFav('+i+')'}" style="background:none;border:1px solid #ddd;padding:4px 12px;border-radius:4px;font-size:12px;color:#999;margin-right:6px">移除</button>
      <button onclick="practiceOne('${from}',${i})" style="background:#4A90D9;color:#fff;border:none;padding:4px 12px;border-radius:4px;font-size:12px">再做一次</button>
    </div>
  </div>`;
}

function removeWrong(i) { wrongList.splice(i, 1); save('wrong', wrongList); showWrongTab(); }
function removeFav(i) { favList.splice(i, 1); save('fav', favList); showFavTab(); }
function clearWrong() { if(confirm('确定清空错题？')){wrongList=[];save('wrong',wrongList);showWrongTab();} }
function clearFav() { if(confirm('确定清空收藏？')){favList=[];save('fav',favList);showFavTab();} }
function practiceWrong() { pageStack.push(showWrongTab); startQuiz(shuffle(wrongList), '错题重练'); }
function practiceFav() { pageStack.push(showFavTab); startQuiz(shuffle(favList), '收藏练习'); }
function practiceOne(listName, i) {
  const list = listName === 'wrong' ? wrongList : favList;
  const page = listName === 'wrong' ? showWrongTab : showFavTab;
  pageStack.push(page);
  startQuiz([list[i]], '做题');
}

// ===== 收藏操作 =====
function isFav(id) { return favList.some(q => q.id === id); }
function toggleFav() {
  const q = quizState.questions[quizState.index];
  if (isFav(q.id)) { favList = favList.filter(x => x.id !== q.id); } else { favList.unshift({...q}); }
  save('fav', favList);
  renderQuestion();
}

// ===== Tab 切换 =====
function showTab(tab) {
  pageStack = [];
  document.getElementById('tabBar').style.display = 'flex';
  if (tab === 'home') showHome();
  else if (tab === 'wrong') showWrongTab();
  else if (tab === 'fav') showFavTab();
}

// ===== 启动 =====
init();
</script>
</body>
</html>
